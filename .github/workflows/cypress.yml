name: Cypress

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Temporary workaround: @remix-run/react@2.17.x peers React ^18 while this repo pins React 19.2.6.
        # TODO: Remove --legacy-peer-deps after aligning React/Remix peer versions.
        # Use legacy peer resolution in CI until deps are aligned.
        run: npm ci --legacy-peer-deps

      - name: Build app
        run: npm run build

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          command: npm run cypress:run
