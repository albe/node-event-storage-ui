name: npm publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0 or v1.0.0-alpha.1)"
        required: true
        type: string

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.target_commitish }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package repository url
        run: |
          REPO=$(node -p "(() => { const r=require('./package.json').repository; return (typeof r==='string')?r:(r&&r.url)||'' })()")
          echo "package.json repository.url = $REPO"
          test "$REPO" = "git+https://github.com/albe/node-event-storage-ui.git" \
            || { echo "ERROR: repository.url must be git+https://github.com/albe/node-event-storage-ui.git for npm OIDC trusted publishing"; exit 1; }

      - name: Validate version
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] \
            || { echo "ERROR: invalid tag format '$TAG'"; exit 1; }
          echo "tag=$TAG version=$VERSION"
          test "v$VERSION" = "$TAG" || { echo "ERROR: Tag ($TAG) does not match package.json version (v$VERSION)"; exit 1; }

      - name: Pack
        run: npm pack

      - name: Verify pack contents
        run: |
          TARBALL=$(ls event-storage-ui-*.tgz)
          FILES=$(tar tzf "$TARBALL")
          echo "$FILES"

          REQUIRED=(
            "package/package.json"
            "package/README.md"
            "package/eventstore.js"
            "package/eventstore.config.json"
            "package/app/root.jsx"
            "package/projections/StorageStats.js"
            "package/helpers/format.js"
          )
          for f in "${REQUIRED[@]}"; do
            echo "$FILES" | grep -qF "$f" || { echo "ERROR: required file '$f' is missing from the package"; exit 1; }
          done

          FORBIDDEN=(
            "\\.env"
            "node_modules/"
            "package/cypress/"
            "package/public/screenshots/"
          )
          for pattern in "${FORBIDDEN[@]}"; do
            if echo "$FILES" | grep -qE "$pattern"; then
              echo "ERROR: package contains files matching forbidden pattern '$pattern'"
              exit 1
            fi
          done

          echo "Package contents verified successfully."

  publish:
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.target_commitish }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - name: Update npm
        run: npm install -g npm@11
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Resolve npm dist-tag
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            PREID="${VERSION#*-}"
            DIST_TAG="${PREID%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "Using npm dist-tag: $DIST_TAG for version: $VERSION"
          echo "NPM_DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"
      - run: npm publish --provenance --access public --tag "$NPM_DIST_TAG"


